name: codejudge
description: "CodeJudge - Sistema de evaluación automática de código para estudiantes de programación."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Gráficos y visualización
  fl_chart: ^0.69.2

  # Fuentes e iconos
  google_fonts: ^6.2.1

  # Almacenamiento local
  shared_preferences: ^2.3.3

  # Utilidades
  intl: ^0.19.0

  # Animaciones
  flutter_animate: ^4.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
